<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      width: 300px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 14px;
      color: #e0e7ff;
      background: #1e1b4b;
    }
    h2 {
      margin: 0 0 12px;
      font-size: 16px;
    }
    label {
      display: block;
      margin-bottom: 4px;
      font-size: 12px;
      color: #a5b4fc;
    }
    input {
      width: 100%;
      padding: 8px;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 6px;
      background: rgba(255,255,255,0.05);
      color: #e0e7ff;
      font-size: 13px;
      box-sizing: border-box;
    }
    input:focus {
      outline: none;
      border-color: #6366f1;
    }
    button {
      margin-top: 12px;
      width: 100%;
      padding: 8px;
      border: none;
      border-radius: 6px;
      background: #6366f1;
      color: white;
      font-size: 13px;
      cursor: pointer;
    }
    button:hover {
      background: #4f46e5;
    }
    .status {
      margin-top: 8px;
      font-size: 12px;
      color: #34d399;
    }
  </style>
</head>
<body>
  <h2>JobTracker Settings</h2>
  <label for="backend-url">Backend URL</label>
  <input type="url" id="backend-url" placeholder="http://localhost:3000" />
  <button id="save-btn">Save</button>
  <div id="status" class="status"></div>
  <script src="popup.js"></script>
</body>
</html>
